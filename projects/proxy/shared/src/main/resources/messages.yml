# ==========================================================
#                       INFORMATION
#                 HEX Values are Supported
#  Example: <#FFFFFF>Some text</#FFFFFF> this is a message!
#         Supports Mini-Message/Legacy Color Codes
# ==========================================================

# Prefix for the plugin. %plugin-prefix% usable anywhere.
plugin-prefix: "&8[<bold><rainbow>AdvancedProxyChat&r&8]"

# Minecraft Stuff
minecraft:
  join:
    enabled: true
    message: "&e%player% &ahas joined the network. (%server%)"
  leave:
    enabled: true
    message: "&e%player% &chas left the network. (%server%)"
  chat:
    enabled: true
    message: "&8[&3%server%&8] &e%player% &9» &7%message%"
    vanished: "&cYou cannot send proxy messages while vanished. Your message must end with a '&e/&c' to speak."
  switch:
    enabled: true
    default: "&e%player% &7moved from &c%from% &7to &a%to%&7."
    no-from: "&e%player% &7moved &7to &a%to%&7."
  whisper:
    send: "&8[&dyou&8] &f-> &8[&d%receiver%&8] &9 &e%message%"
    receive: "&8[&d%sender%&8] &f-> &8[&dyou&8] &9 &e%message%"
    error: "&c/apc-msg (user) (message)"
  discord:
    enabled: true
    message: "**%server%** %player% » %message%"
    # Default format for multi-channel MC->Discord messages.
    # Placeholders: %channel%, %server%, %original_server%, %player%, %message%, %epoch%, %time%, %prefix%, %suffix%
    channel-message: "[%channel%] **%server%** %player% » %message%"
    embed:
      use: false
      title: "[%server%] %player%"
      message: "%message%"
      color: "#FFC0CB"
      use-timestamp: true
  command:
    no-permission: "%plugin-prefix% &cSorry, you do not have permission to run this command."
    unknown: "%plugin-prefix% &cUnknown command."
    must-be-player: "%plugin-prefix% &cYou must be a player to run this command."
    reload: "%plugin-prefix% &aThe plugin has been successfully reloaded!"
    chat-lock:
      usage: "%plugin-prefix% &cCorrect usage is &a/apc-chat all lock/unlock &c or &a/apc-chat lock/unlock"
      single:
        locked: "%plugin-prefix% &6%server% &cwill no longer send proxy chat messages."
        unlocked: "%plugin-prefix% &6%server% &awill now send proxy chat messages."
      all:
        locked: "%plugin-prefix% &cAll servers will no longer send proxy chat messages."
        unlocked: "%plugin-prefix% &aAll servers will now send proxy chat messages."
    proxy-ban:
      usage: "%plugin-prefix% &c/(un)ban (player)"
      banned: "%plugin-prefix% &c%player% &7has been banned."
      unbanned: "%plugin-prefix% &c%player% &7has been unbanned."
      login-message: "&cYou have been banned from the proxy."
    broadcast:
      usage: "%plugin-prefix% &c/apc-bc (message)"
      message: "%plugin-prefix% &8[&a&lBROADCAST&r&8] &6%message%"
    # Added in file-version 12: multi-channel Discord bridge commands.
    channels:
      header: "%plugin-prefix%&7--- &bChannels &7---"
      entry: "  &b%channel% &8| &7Send: %send%  Receive: %receive%"
      toggled-send-on:  "%plugin-prefix%&a%channel%: &7Send &aenabled."
      toggled-send-off: "%plugin-prefix%&c%channel%: &7Send &cdisabled."
      toggled-receive-on:  "%plugin-prefix%&a%channel%: &7Receive &aenabled."
      toggled-receive-off: "%plugin-prefix%&c%channel%: &7Receive &cdisabled."
      no-channels: "%plugin-prefix%&cNo channels are configured."
      usage: "%plugin-prefix%&7Usage: &b/channels &7[channel] &b[send|receive]"
    listen:
      started: "%plugin-prefix%&7Listening to &b%channel% &7for the next &b%amount% &7message(s)."
      expired: "%plugin-prefix%&7Your listen session for &b%channel% &7has ended."
      usage: "%plugin-prefix%&7Usage: &b/listen &7<channel> <amount>"
      no-such-channel: "%plugin-prefix%&cUnknown channel: &7%channel%"
      receive-disabled: "%plugin-prefix%&cReceiving is disabled for &7%channel%&c. You cannot use /listen on it."
    history:
      header: "%plugin-prefix%&7--- &bHistory: %channel% &7(last %amount%) ---"
      empty: "%plugin-prefix%&7No history for &b%channel%&7 yet."
      usage: "%plugin-prefix%&7Usage: &b/history &7<channel> <amount>"
      no-such-channel: "%plugin-prefix%&cUnknown channel: &7%channel%"

# Discord Stuff
discord:
  join:
    enabled: true
    message: "%player% has joined the network. (%server%)"
    use-timestamp: true
    # Incompatible with use-timestamp.
    use-embed: true
  leave:
    enabled: true
    message: "%player% has left the network. (%server%)"
    use-timestamp: true
    # Incompatible with use-timestamp.
    use-embed: true
  switch:
    enabled: true
    message: "%player% has switched from %from% to %to%."
    use-timestamp: true
    # Incompatible with use-timestamp.
    use-embed: true
  chat:
    enabled: true
    minecraft-message: "&8[&bDiscord&8] %role% &f%user% &9» &7%message%"
    # Default format when a message arrives from a named channel (multi-channel mode).
    # Placeholders: %channel%, %role%, %user%, %nick%, %message%, %epoch%, %time%, %plugin-prefix%
    channel-minecraft-message: "&8[&b%channel%&8] %role% &f%user% &9» &7%message%"
  topic:
    online: "There are %online% players online."
    offline: "The proxy is offline."
  proxy-status:
    enabled: true
    messages:
      enabled: "✅ Proxy enabled!"
      disabled: "⛔ Proxy disabled."
      title: "Server Status"
      message: "Status: "
      online: "Online ✅"
      offline: "Offline ⛔"
      use-timestamp: true

# Console Stuff - Uses Minecraft Messages
console:
  chat: true
  join: true
  leave: true
  switch: true
  discord-chat: true
  server-status: true

# The message for any updates that are sent.
# The plugin-prefix is automatically appended to the beginning of this message.
update-message: "&7There is an update! You are on &c%old%. New version is &a%new%&7: &6%link%"


# DO NOT TOUCH THIS
file-version: 12
