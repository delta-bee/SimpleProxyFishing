# ==========================================================
#                       INFORMATION
#                 HEX Values are Supported
#  Example: <#FFFFFF>Some text</#FFFFFF> this is a message!
#         Supports Mini-Message/Legacy Color Codes
# ==========================================================

# True if you will be using Discord.
use-discord: false

# Discord Bot Token (IGNORE IF use_discord = false).
BOT-TOKEN: "TOKEN_HERE"

# Discord channel ID for system messages: join/leave/switch events and proxy-status embeds.
# Chat bridging (Minecraft <-> Discord) is configured per-channel in the 'channels:' section below.
# Leave as SYSTEM_CHANNEL_ID to disable system messages.
system-messages-channel-id: "SYSTEM_CHANNEL_ID"

bot-activity:
  # Valid Types: ONLINE, DO_NOT_DISTURB, IDLE, INVISIBLE
  status: ONLINE
  # Valid Types: PLAYING, STREAMING, LISTENING, WATCHING, COMPETING, CUSTOM_STATUS
  type: "CUSTOM_STATUS"
  # Valid placeholders are %online% and/or %max-players% (UPDATES EVERY 5 MINUTES)
  text: "%online%/%max-players% - AdvancedProxyChat by beanbeanjuice"

# The amount of seconds to check if a server is online/offline.
# Smaller numbers can cause errors. Beware.
server-update-interval: 3

# Use this if you want to change the default aliases.
# It MUST be the same name you have in your bungee/velocity config.
# Simply set it to disabled: disabled to disable it.
aliases:
  ServerInConfigExample: ServerAliasExample
  hub: Hub1
  smp: smp1

# Whether to use the permission system.
# Some permissions (denoted with ➕) are always active even if this is false.
# advancedproxychat.read.chat - Read chat messages.
# advancedproxychat.read.join - Read join messages.
# advancedproxychat.read.leave - Read leave messages.
# advancedproxychat.read.fake - Read the fake join/leave messages. Players must also have the REAL join/leave permission.
# advancedproxychat.read.switch - Read switch messages.
# advancedproxychat.read.update - Read update messages. ➕
# advancedproxychat.toggle.chat - Toggle proxy chat for a single server. ➕
# advancedproxychat.toggle.chat.all - Toggle proxy chat for all servers. ➕
# advancedproxychat.reload - Reload the config. ➕
# advancedproxychat.ban - Ban a player from the proxy. ➕
# advancedproxychat.unban - Unban a player from the proxy. ➕
# advancedproxychat.whisper - Whisper to another player on the proxy. ➕
# advancedproxychat.broadcast - Broadcast a message to everyone on the server. ➕
# advancedproxychat.channels - View and toggle per-channel send/receive preferences. (always active)
# advancedproxychat.listen - Temporarily subscribe to a channel for N messages. (always active)
# advancedproxychat.history - View the last N messages from a channel. (always active)
use-permissions: false

# Only messages that start with this character will be sent through the plugin.
# Set to '' to disable.
# Example: If it is set to '$', then when a player sends $hello, it will be sent through the proxy.
proxy-message-prefix: ''

# Whether to send if the statuses of the servers connected to the proxy when the proxy starts up.
# THIS IS FOR DISCORD MESSAGES ONLY.
use-initial-server-status: true

# Whether to send a fake join/leave message when vanishing/unvanishing.
use-fake-messages: true

# Format: https://docs.oracle.com/javase/8/docs/api/java/time/format/DateTimeFormatter.html
# Timezone: https://www.joda.org/joda-time/timezones.html
timestamp:
  format: "hh:mm a"
  timezone: "America/Los_Angeles"

# True if you will be using the helper plugin.
use-helper: false

update-notifications: true

# It is HIGHLY recommended to use a more robust proxy-wide banning system such as LiteBans or AdvancedBan.
# However, if you would rather a light-weight, simple, banning system. You can enable it here.
# A FULL PROXY RESTART IS REQUIRED TO USE THIS.
use-advanced-proxy-chat-banning-system: false

# This will store and re-send the last few chat messages when a player switches servers.
# This is here because sometimes Velocity/Bungee does not keep the previous messages when switching.
# This WILL retain old formatting if you change the formatting prior to reloading.
send-previous-messages-on-switch:
  enabled: false
  amount: 15

# These require a restart in order to take place.
commands:
  reload-aliases:
    - "spc-reload"
  chat-toggle-aliases:
    - "spc-chat"
  ban-aliases:
    - "spc-ban"
  unban-aliases:
    - "spc-unban"
  whisper-aliases:
    - "msg"
    - "apc-msg"
  reply-aliases:
    - "spc-reply"
    - "apc-r"
  broadcast-aliases:
    - "broadcast"
    - "apc-bc"
  # Multi-channel Discord bridge commands.
  channels-aliases:
    - "channels"
    - "apc-channels"
  listen-aliases:
    - "listen"
    - "apc-listen"
  history-aliases:
    - "history"
    - "apc-history"

# Disable servers from sending/receiving proxy messages.
disabled-servers:
  - example1

# ==========================================================
#                    MULTI-CHANNEL DISCORD
# Added in file-version 18 (AdvancedProxyChat).
# Each entry below defines one Discord channel to bridge.
# Players can route a message to a channel by typing
#   !<prefix> message    (e.g.  !s hello  to send to "staff")
#   !<prefix1><prefix2>  (stack multiple flags at once)
# They can also toggle default send/receive per-channel via
#   /channels  (or any configured alias)
# and inspect history with  /listen  and  /history.
# ==========================================================
channels:
  - name: "discord"
    prefix: "d"
    channel-id: "YOUR_CHANNEL_ID_HERE"
    disable-send: false
    disable-receive: false
    # Optional per-channel format overrides. Remove these lines to use the global defaults from messages.yml.
    # mc-to-discord placeholders: %channel%, %server%, %original_server%, %player%, %escaped_player%, %message%, %epoch%, %time%, %prefix%, %suffix%
    # mc-to-discord: "%player%: %message%"
    # discord-to-mc placeholders: %channel%, %role%, %user%, %nick%, %message%, %epoch%, %time%, %plugin-prefix%
    # discord-to-mc: "&8[&b%channel%&8] &f%user%: &7%message%"


# DO NOT TOUCH THIS
file-version: 19
